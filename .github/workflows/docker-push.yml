name: Build and Push Docker Monolith to Docker Hub

on:
  push:
    branches:
      - main
  # Allow manual triggering
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Monolithic Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.monolith
          push: true
          # Tags the image as 'latest' and also attaches the short commit SHA for versioning
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshield:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshield:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rideshield:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/rideshield:buildcache,mode=max
